name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish (self-contained single file — no .NET install needed)
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -p:DebugType=None

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WEVG-windows
          path: bin/Release/net8.0-windows10.0.19041.0/win-x64/publish/WEVG.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/Release/net8.0-windows10.0.19041.0/win-x64/publish/WEVG.exe
          generate_release_notes: true
          draft: false
          prerelease: false
